# Run Pywikibot tests with Python/OS matrix
name: Pywikibot CI

on:
  push:
    branches: [master, stable]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYWIKIBOT_TEST_RUNNING: 1
  PYWIKIBOT_USERNAME: Pywikibot-test

jobs:
  build:
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    continue-on-error: ${{ matrix.experimental || false }}
    timeout-minutes: 100
    strategy:
      fail-fast: false
      max-parallel: 19
      matrix:
        python-version: [pypy3.10, '3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
        site: ['wikipedia:en', 'wikisource:zh']
        include:
          # ... your existing include list ...
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        if: "!endsWith(matrix.python-version, '-dev')"
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up development Python ${{ matrix.python-version }}
        uses: deadsnakes/action@v3.2.0
        if: endsWith(matrix.python-version, '-dev')
        with:
          python-version: ${{ matrix.python-version }}

      - name: Restore virtualenv cache
        uses: actions/cache/restore@v4
        id: venv-cache
        with:
          key: venv-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('requirements.txt', 'dev-requirements.txt') }}
          path: .venv

      - name: Create virtualenv and install dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip setuptools wheel
          if [ -f dev-requirements.txt ]; then .venv/bin/pip install -r dev-requirements.txt; fi
          if [ -f requirements.txt ]; then .venv/bin/pip install -r requirements.txt; fi
          .venv/bin/pip install wikitextparser

      - name: Activate virtualenv
        run: |
          echo ".venv/bin" >> $GITHUB_PATH

      - name: Save virtualenv to cache
        uses: actions/cache/save@v4
        with:
          key: venv-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('requirements.txt', 'dev-requirements.txt') }}
          path: .venv

      # Continue your existing steps...
      - name: Generate family files
        run: |
          # (your existing conditional commands)
      
      - name: Generate user files
        run: |
          # (your existing user generation commands)
      
      - name: Test with unittest or pytest
        id: ci_test
        continue-on-error: true
        timeout-minutes: 90
        env:
          PYWIKIBOT_TEST_NO_RC: ${{ (matrix.site == 'wikisource:zh' || matrix.test_no_rc) && 1 || 0 }}
        run: |
          python pwb.py version
          if [ "${{ matrix.site || 0 }}" != 'wikisource:zh' ]; then
            coverage run -m unittest discover -vv -p "*_tests.py"
          else
            coverage run -m pytest
          fi

      - name: Show coverage statistics
        run: coverage report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Check on failure
        if: steps.ci_test.outcome == 'failure'
        run: exit 1
